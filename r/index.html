<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const routes = {
        "singular-reg": "/experiences/singular/register/",
      };

      const path = window.location.pathname.split("/").pop();

      if (routes[path]) {
        window.location.replace(routes[path]);
      } else {
        document.body.innerHTML = "Not found";
      }
    </script>
  </head>
</html>
