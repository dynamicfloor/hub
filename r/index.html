<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const routes = {
        "sreg": "/experiences/singular/register/",
      };

      // toma "sreg" directamente desde ?sreg
      const query = window.location.search.replace("?", "");

      if (routes[query]) {
        window.location.replace(routes[query]);
      } else {
        document.body.innerHTML = "Not found";
      }
    </script>
  </head>
</html>
